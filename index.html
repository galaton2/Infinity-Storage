<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header class="header">
        <h1>🧠 Твой Архив</h1>
        <p id="status-text">Загрузка файлов...</p>
    </header>

    <div id="loader" class="gallery">
        <div class="skeleton"></div>
        <div class="skeleton" style="height: 200px;"></div>
        <div class="skeleton"></div>
        <div class="skeleton" style="height: 150px;"></div>
    </div>

    <main id="gallery-container" class="gallery" style="display: none;"></main>

    <div id="photo-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="Full photo">
            <div class="modal-actions">
                <button id="delete-btn" class="btn btn-danger">🗑 Удалить из базы</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
