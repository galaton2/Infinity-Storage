<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow secondary"></div>

    <div class="container">
        
        <div class="header-top">
            <h1 class="app-title">Aura</h1>
            <button class="icon-btn" onclick="switchTab('profile')">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>

        <div id="tab-home" class="tab-content active">
            
            <div class="section-header" style="margin-top: 0;">
                <h2 class="section-title">Featured Asset</h2>
            </div>
            
            <div class="hero-card" id="heroCard">
                <div class="hero-content">
                    <div class="hero-label">
                        <svg class="svg-icon" style="width: 14px; height: 14px;" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        Recently Synced
                    </div>
                </div>
                <div class="hero-content" style="margin-top: auto;">
                    <h1 class="hero-title heading" id="heroTitle">Retrieving...</h1>
                    <p class="hero-subtitle" id="heroSubtitle">Connecting to Vault</p>
                </div>
                <button class="hero-play-btn" onclick="triggerHeroAction()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3z"/></svg>
                </button>
            </div>
            
            </div>

        <div id="tab-files" class="tab-content">
            <h1 class="heading" style="font-size: 32px; margin-bottom: 24px;">Vault Assets</h1>
            
            <div class="search-box">
                <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search files..." oninput="handleSearch()">
            </div>

            <div class="section-header" style="margin-top: 12px;">
                <h2 class="section-title">Workspaces</h2>
                <button class="section-action" onclick="createWorkspace()">Create New</button>
            </div>
            
            <div class="workspace-scroll" id="foldersContainer">
                </div>

            <div class="grid-gallery" id="fullGallery">
                </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <h1 class="heading" style="font-size: 32px; margin-bottom: 24px;">Account</h1>
            
            <div class="profile-hero">
                <div class="profile-avatar" id="userAvatar">B</div>
                <h2 class="heading" id="userName" style="font-size: 26px; margin-bottom: 4px; color: #fff;">Bekhruz</h2>
                <p style="color: var(--text-muted); font-size: 14px;">Master Admin</p>
            </div>

            <div class="storage-box">
                <div class="storage-labels">
                    <span class="storage-used" id="dataUsedText">0.0 MB Used</span>
                    <span class="storage-infinity">Synology Server</span>
                </div>
                <div class="hero-progress-track">
                    <div class="hero-progress-fill" id="dataUsedFill"></div>
                </div>
                <p style="font-size: 13px; color: var(--text-muted); margin-top: 12px;">Your data is completely unbounded and securely synced via Infinity Node.</p>
            </div>
        </div>

    </div>

    <div class="nav-container">
        <div class="nav-bar">
            <button class="nav-item active" id="nav-home" onclick="switchTab('home', this)">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </button>
            <button class="nav-item" id="nav-files" onclick="switchTab('files', this)">
                <svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Files
            </button>
            <button class="nav-item" onclick="tg.showAlert('Send assets directly via Telegram bot to sync.', () => tg.close())">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Sync
            </button>
        </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
    <div class="action-sheet" id="actionSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title heading" id="sheetTitle">Manage Workspace</div>
        <button class="sheet-btn" onclick="actionRename()">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Rename Workspace
        </button>
        <button class="sheet-btn danger" onclick="actionDelete()">
            <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete Workspace
        </button>
    </div>

    <div class="modal" id="imageModal">
        <button class="icon-btn modal-close" onclick="closeModal()">
            <svg class="svg-icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <img id="modalImage" src="" alt="Asset">
    </div>

    <div id="toast-box"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        // ВАЖНО: Выключаем вертикальные свайпы закрытия для свежих версий Telegram
        if(tg.disableVerticalSwipes) { tg.disableVerticalSwipes(); }
        tg.ready();

        let globalFiles = [];
        
        const iconAll = `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`;
        const iconShield = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;
        const iconBriefcase = `<svg class="svg-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`;
        const iconFolder = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;

        let workspaces = [
            { id: 'work', name: 'Workplace', icon: iconBriefcase },
            { id: 'personal', name: 'Private Vault', icon: iconShield }
        ];
        
        // По умолчанию показываем ВСЕ файлы
        let activeWorkspace = 'all';
        let targetedWorkspace = null;
        let searchQuery = '';

        const API_URL = "https://galaxylab.i234.me:8443/api/files";
        const user = tg.initDataUnsafe?.user;
        document.getElementById('userName').innerText = user?.first_name || 'Bekhruz';
        document.getElementById('userAvatar').innerText = (user?.first_name || 'B').charAt(0);

        async function initApp() {
            const userId = user?.id || '123456789';
            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();
                if (data.status === "success" && data.files.length > 0) {
                    globalFiles = data.files.map(f => ({...f, folder: 'work'}));
                } else throw new Error("empty");
            } catch (e) {
                globalFiles = [
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400', text: 'Abstract Art', folder: 'work' },
                    { type: 'document', text: 'Financial_Q3.pdf', folder: 'work' },
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400', text: 'Design Concept', folder: 'personal' },
                    { type: 'document', text: 'Passport_Scan.pdf', folder: 'personal' }
                ];
            }
            updateStorageData();
            updateHero(globalFiles[0]);
            renderWorkspaces();
            renderContent();
        }

        // ================= PROGRESS BAR LOGIC =================
        function updateStorageData() {
            const mbCount = (globalFiles.length * 3.4).toFixed(1);
            document.getElementById('dataUsedText').innerText = `${mbCount} MB Used`;
            
            // Заполнение от 2 до 12% максимум, чтобы показать безлимитный потенциал
            const baseFill = 2; 
            const dynamicFill = Math.min((globalFiles.length * 0.5), 10);
            const totalPercent = baseFill + dynamicFill;
            
            setTimeout(() => {
                document.getElementById('dataUsedFill').style.width = totalPercent + '%';
            }, 300);
        }

        // ================= WORKSPACES (FOLDERS) =================
        function renderWorkspaces() {
            const container = document.getElementById('foldersContainer');
            container.innerHTML = '';
            
            // Вручную добавляем папку "ALL ASSETS" первой
            const allCard = document.createElement('div');
            allCard.className = `workspace-card ${activeWorkspace === 'all' ? 'active' : ''}`;
            allCard.innerHTML = `<div class="workspace-icon">${iconAll}</div><div style="margin-top: auto;"><div class="workspace-title">All Assets</div><div class="workspace-count">${globalFiles.length} files</div></div>`;
            allCard.onclick = () => {
                activeWorkspace = 'all'; renderWorkspaces(); renderContent(); tg.HapticFeedback.selectionChanged();
            };
            container.appendChild(allCard);
            
            // Добавляем остальные папки пользователя
            workspaces.forEach(ws => {
                const count = globalFiles.filter(f => f.folder === ws.id).length;
                const card = document.createElement('div');
                card.className = `workspace-card ${activeWorkspace === ws.id ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="workspace-icon">${ws.icon}</div>
                    <div style="margin-top: auto;">
                        <div class="workspace-title">${ws.name}</div>
                        <div class="workspace-count">${count} assets</div>
                    </div>`;

                card.onclick = () => {
                    activeWorkspace = ws.id; renderWorkspaces(); renderContent(); tg.HapticFeedback.selectionChanged();
                };
                
                // Долгий тап = Контекстное меню (только для пользовательских папок)
                let pressTimer;
                const start = () => pressTimer = setTimeout(() => openSheet(ws), 600);
                const cancel = () => clearTimeout(pressTimer);
                card.addEventListener('touchstart', start); card.addEventListener('touchend', cancel);
                card.addEventListener('mousedown', start); card.addEventListener('mouseup', cancel);
                card.addEventListener('mouseleave', cancel);
                
                container.appendChild(card);
            });
        }

        function createWorkspace() {
            tg.HapticFeedback.impactOccurred('light');
            const name = prompt("Workspace Name:");
            if(!name) return;
            workspaces.push({ id: 'ws_'+Date.now(), name: name, icon: iconFolder });
            renderWorkspaces(); showToast("Workspace created");
        }

        // ================= RENDER ARCHIVE =================
        function renderContent() {
            const fullGrid = document.getElementById('fullGallery');
            fullGrid.innerHTML = '';

            // Фильтруем файлы по ПАПКЕ и ПОИСКУ одновременно
            const filteredFiles = globalFiles.filter(f => {
                const matchFolder = (activeWorkspace === 'all') || (f.folder === activeWorkspace);
                const matchSearch = (f.text || '').toLowerCase().includes(searchQuery.toLowerCase());
                return matchFolder && matchSearch;
            });

            if(filteredFiles.length === 0) {
                fullGrid.innerHTML = `<div class="empty-state">${iconFolder}<div>No assets found here</div></div>`;
            }
            
            filteredFiles.forEach(file => fullGrid.appendChild(createCard(file)));
        }

        function createCard(file) {
            const card = document.createElement('div');
            card.className = `grid-item ${file.type}`;
            if(file.type === 'photo') {
                card.innerHTML = `<img src="${file.url}" alt="Img" loading="lazy">`;
                card.onclick = () => openModal(file.url);
            } else {
                const docSvg = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;
                card.innerHTML = `${docSvg}<div class="item-title">${file.text}</div><div class="item-meta">Document</div>`;
                card.onclick = () => tg.showAlert("Secure documents are streamed via Telegram bot.");
            }
            return card;
        }

        function updateHero(file) {
            if(!file) return;
            const title = file.type === 'document' ? file.text.split('.')[0] : "Visual Asset";
            document.getElementById('heroTitle').innerText = title;
            document.getElementById('heroSubtitle').innerText = file.type === 'document' ? 'Document Type' : 'Image Format';
            if (file.type === 'photo') {
                document.getElementById('heroCard').style.background = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.9)), url('${file.url}') center/cover`;
            }
        }

        function triggerHeroAction() {
            tg.HapticFeedback.impactOccurred('medium');
            if(globalFiles.length > 0 && globalFiles[0].type === 'photo') openModal(globalFiles[0].url);
            else tg.showAlert("Preview not supported for this format.");
        }

        // ================= TABS & SEARCH =================
        function switchTab(tabId, navBtn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            if(navBtn) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                navBtn.classList.add('active');
            }
            window.scrollTo(0,0); tg.HapticFeedback.selectionChanged();
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value;
            renderContent();
        }

        // ================= SHEETS & MODALS =================
        function openSheet(ws) {
            targetedWorkspace = ws;
            document.getElementById('sheetTitle').innerText = ws.name;
            document.getElementById('actionSheet').classList.add('active');
            document.getElementById('sheetOverlay').classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeSheet() {
            document.getElementById('actionSheet').classList.remove('active');
            document.getElementById('sheetOverlay').classList.remove('active');
            targetedWorkspace = null;
        }

        function actionRename() {
            const newName = prompt("Rename to:");
            if(newName && targetedWorkspace) { targetedWorkspace.name = newName; renderWorkspaces(); }
            closeSheet();
        }

        function actionDelete() {
            if(!targetedWorkspace) return;
            // Перекидываем файлы в папку work
            globalFiles.forEach(f => { if(f.folder === targetedWorkspace.id) f.folder = 'work'; });
            workspaces = workspaces.filter(w => w.id !== targetedWorkspace.id);
            if(activeWorkspace === targetedWorkspace.id) activeWorkspace = 'all'; // При удалении кидаем в общий раздел
            renderWorkspaces(); renderContent(); closeSheet(); showToast("Workspace Removed");
        }

        function openModal(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }
        function closeModal() { document.getElementById('imageModal').classList.remove('active'); }

        function showToast(msg) {
            const box = document.getElementById('toast-box');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerText = msg;
            box.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
