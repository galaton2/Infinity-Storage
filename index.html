<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="tab-gallery" class="tab-content active">
        <div class="header">
            <h1>Storage</h1>
            <div class="header-actions">
                <button onclick="toggleViewMode()" id="viewToggleBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/></svg>
                </button>
            </div>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search files..." oninput="handleSearch()">
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="applyFilter('all')">All</button>
            <button class="filter-btn" onclick="applyFilter('photo')">Photos</button>
            <button class="filter-btn" onclick="applyFilter('document')">Documents</button>
        </div>

        <div class="gallery view-grid" id="gallery">
            </div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="profile-section">
            <div class="avatar" id="userAvatar">U</div>
            <h2 id="userName" style="font-size: 24px; font-weight: 600;">Loading...</h2>
        </div>
        
        <div class="storage-card">
            <div class="storage-header">
                <span>Storage Usage</span>
                <span id="storageAmount">0 MB of ∞</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="storageProgress"></div>
            </div>
            <p style="margin-top: 12px; font-size: 13px; color: var(--text-secondary);">Unlimited cloud space provided by Synology.</p>
        </div>

        <div class="settings-group">
            <div class="setting-item">
                <span>Haptic Feedback</span>
                <label class="switch"><input type="checkbox" id="hapticToggle" checked><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <span>High Quality Photos</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <button class="fab" onclick="handleFabClick()">+</button>

    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="switchTab('gallery', this)">
            <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            Files
        </button>
        <button class="nav-item" onclick="switchTab('profile', this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Profile
        </button>
    </nav>

    <nav class="selection-toolbar" id="selectionToolbar">
        <button class="toolbar-btn" onclick="cancelSelection()">✕ Cancel</button>
        <span id="selectionCount" style="font-weight: 600; font-size: 14px;">1 selected</span>
        <button class="toolbar-btn danger" onclick="deleteSelected()">🗑 Delete</button>
    </nav>

    <div class="modal" id="imageModal">
        <button class="action-btn close-btn" onclick="closeModal()">✕</button>
        <button class="action-btn" onclick="toggleActionSheet()">⋮</button>
        
        <div class="swipe-hint swipe-left">‹</div>
        <img id="modalImage" src="" alt="Full size">
        <div class="swipe-hint swipe-right">›</div>

        <div class="action-sheet" id="actionSheet">
            <button class="sheet-btn" onclick="downloadCurrentItem()">📥 Save to Device</button>
            <button class="sheet-btn" onclick="shareCurrentItem()">↗️ Share File</button>
            <button class="sheet-btn danger" onclick="deleteCurrentItem()">🗑 Delete File</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // ================= STATE =================
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let globalFiles = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let viewMode = 'grid'; // 'grid' or 'list'
        
        // Modal / Swipe State
        let currentPhotoIndex = 0;
        let photoOnlyList = [];
        let touchStartX = 0;

        // Selection State
        let isSelectionMode = false;
        let selectedIds = new Set();
        let pressTimer;

        const API_URL = "https://galaxylab.i234.me:8443/api/files";

        // ================= INIT & FETCH =================
        const user = tg.initDataUnsafe?.user;
        const firstName = user?.first_name || 'Bekhruz';
        document.getElementById('userName').innerText = firstName;
        document.getElementById('userAvatar').innerText = firstName.charAt(0).toUpperCase();

        async function fetchFiles() {
            renderSkeletons();
            const userId = user?.id || '123456789';

            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();
                if (data.status === "success") {
                    globalFiles = data.files.map((f, index) => ({...f, internalId: index})); // Add internal ID for selection
                }
            } catch (error) {
                // Mock for offline
                globalFiles = [
                    { internalId: 0, type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400', text: '' },
                    { internalId: 1, type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400', text: '' },
                    { internalId: 2, type: 'document', text: 'Important_Report.pdf', url: '#' }
                ];
            }
            
            updateStorageMock();
            renderGallery();
        }

        // ================= RENDERING =================
        function renderSkeletons() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            for (let i = 0; i < 12; i++) gallery.innerHTML += `<div class="skeleton" style="height: ${viewMode === 'grid' ? '110px' : '80px'};"></div>`;
        }

        function getFilteredFiles() {
            return globalFiles.filter(f => {
                const matchType = currentFilter === 'all' || f.type === currentFilter;
                const matchSearch = f.text.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                   (f.type === 'document' && 'document'.includes(searchQuery.toLowerCase()));
                return matchType && matchSearch;
            });
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const filtered = getFilteredFiles();
            
            photoOnlyList = filtered.filter(f => f.type === 'photo');

            if (filtered.length === 0) {
                gallery.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--text-secondary); grid-column:1/-1;">📭 No files found</div>`;
                return;
            }

            filtered.forEach((file) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${file.type} ${selectedIds.has(file.internalId) ? 'selected' : ''}`;
                
                // Content based on view mode
                let contentHTML = '';
                const dateMock = "Today, 14:30"; // In real app, format file.timestamp

                if (file.type === 'photo') {
                    contentHTML = `
                        <img src="${file.url}" alt="Photo" loading="lazy">
                        <div class="item-info">
                            <div class="item-title">Photo</div>
                            <div class="item-date">${dateMock}</div>
                        </div>
                    `;
                } else {
                    contentHTML = `
                        <div class="doc-icon">📄</div>
                        <div class="item-info">
                            <div class="item-title">${file.text || 'Document'}</div>
                            <div class="item-date">${dateMock}</div>
                        </div>
                    `;
                }

                // Checkbox for selection
                contentHTML += `<div class="checkbox"></div>`;
                itemDiv.innerHTML = contentHTML;

                // Event Listeners (Long Press vs Click)
                itemDiv.addEventListener('touchstart', () => startPress(file.internalId));
                itemDiv.addEventListener('mousedown', () => startPress(file.internalId));
                
                itemDiv.addEventListener('touchend', () => endPress(file));
                itemDiv.addEventListener('mouseup', () => endPress(file));
                
                itemDiv.addEventListener('touchmove', cancelPress);
                itemDiv.addEventListener('mouseleave', cancelPress);

                gallery.appendChild(itemDiv);
            });
        }

        // ================= SEARCH & VIEW MODE =================
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value;
            renderGallery();
        }

        function toggleViewMode() {
            const gallery = document.getElementById('gallery');
            const btn = document.getElementById('viewToggleBtn');
            if (viewMode === 'grid') {
                viewMode = 'list';
                gallery.classList.replace('view-grid', 'view-list');
                btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>`; // Grid icon
            } else {
                viewMode = 'grid';
                gallery.classList.replace('view-list', 'view-grid');
                btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/></svg>`; // List icon
            }
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.impactOccurred('light');
        }

        function applyFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGallery();
        }

        // ================= MULTI-SELECT LOGIC =================
        function startPress(id) {
            pressTimer = setTimeout(() => {
                if (!isSelectionMode) {
                    isSelectionMode = true;
                    if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.impactOccurred('heavy');
                    document.getElementById('bottomNav').classList.add('hidden');
                    document.getElementById('selectionToolbar').classList.add('active');
                }
                toggleSelection(id);
            }, 500); // 500ms long press
        }

        function cancelPress() { clearTimeout(pressTimer); }

        function endPress(file) {
            clearTimeout(pressTimer);
            if (isSelectionMode) {
                toggleSelection(file.internalId);
            } else {
                // Normal click
                if (file.type === 'photo') {
                    currentPhotoIndex = photoOnlyList.findIndex(f => f.url === file.url);
                    openModal();
                } else {
                    showToast("Docs open via Telegram Chat only");
                }
            }
        }

        function toggleSelection(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            
            if (selectedIds.size === 0) return cancelSelection();
            
            document.getElementById('selectionCount').innerText = `${selectedIds.size} selected`;
            renderGallery();
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.selectionChanged();
        }

        function cancelSelection() {
            isSelectionMode = false;
            selectedIds.clear();
            document.getElementById('bottomNav').classList.remove('hidden');
            document.getElementById('selectionToolbar').classList.remove('active');
            renderGallery();
        }

        function deleteSelected() {
            globalFiles = globalFiles.filter(f => !selectedIds.has(f.internalId));
            cancelSelection();
            updateStorageMock();
            showToast("Selected files deleted");
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.notificationOccurred('success');
        }

        // ================= SWIPE MODAL =================
        function openModal() {
            const file = photoOnlyList[currentPhotoIndex];
            if (!file) return;
            document.getElementById('modalImage').src = file.url;
            document.getElementById('imageModal').classList.add('active');
            document.getElementById('actionSheet').classList.remove('active'); // hide sheet
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
            document.getElementById('actionSheet').classList.remove('active');
        }

        // Swipe Detection
        const modalEl = document.getElementById('imageModal');
        modalEl.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        modalEl.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) { // Swipe Left (Next)
                if (currentPhotoIndex < photoOnlyList.length - 1) {
                    currentPhotoIndex++;
                    openModal();
                    if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.selectionChanged();
                }
            }
            if (touchEndX - touchStartX > 50) { // Swipe Right (Prev)
                if (currentPhotoIndex > 0) {
                    currentPhotoIndex--;
                    openModal();
                    if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.selectionChanged();
                }
            }
        });

        // ================= ACTION SHEET =================
        function toggleActionSheet() {
            document.getElementById('actionSheet').classList.toggle('active');
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.impactOccurred('light');
        }

        function downloadCurrentItem() {
            showToast("Downloading...");
            toggleActionSheet();
        }
        
        function shareCurrentItem() {
            showToast("Link copied to clipboard");
            toggleActionSheet();
        }

        function deleteCurrentItem() {
            const file = photoOnlyList[currentPhotoIndex];
            globalFiles = globalFiles.filter(f => f.internalId !== file.internalId);
            closeModal();
            renderGallery();
            updateStorageMock();
            showToast("File deleted");
        }

        // ================= FAB & MISC =================
        function handleFabClick() {
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.notificationOccurred('success');
            
            // Нативное Alert-окно Телеграма
            tg.showAlert("Отправьте любой файл в чат с ботом, и он моментально появится в вашем облаке.", function() {
                // Закрывает WebApp и возвращает пользователя в чат с ботом
                tg.close();
            });
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.selectionChanged();
        }

        function updateStorageMock() {
            // Фейковый подсчет места (в реальности нужно брать размеры из базы)
            const mb = (globalFiles.length * 2.4).toFixed(1);
            document.getElementById('storageAmount').innerText = `${mb} MB of ∞`;
            // Анимация бара (до 10% для вида)
            setTimeout(() => {
                document.getElementById('storageProgress').style.width = globalFiles.length > 0 ? '5%' : '0%';
            }, 100);
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { if (container.contains(toast)) toast.remove(); }, 3000);
        }

        window.onload = fetchFiles;
    </script>
</body>
</html>
