<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow right"></div>

    <div class="container">
        <div class="header-top">
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            </button>
            <button class="icon-btn" onclick="switchTab('profile')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="section-title">Latest Upload</div>
            
            <div class="hero-card" id="heroCard">
                <div class="hero-content">
                    <h1 class="hero-title serif" id="heroTitle">Economics<br>Summary</h1>
                    <p class="hero-subtitle" id="heroSubtitle">12 MB PDF Document</p>
                </div>
                <button class="play-btn" onclick="openHeroFile()">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>

            <div class="section-title">Recent Folders</div>
            
            <div class="scroll-section">
                <div class="glass-card gradient-bg">
                    <div class="glass-content">
                        <h2 class="glass-title serif">Tor Vergata<br>Docs</h2>
                        <p class="glass-subtitle">8 items</p>
                    </div>
                </div>
                <div class="glass-card">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400" alt="bg">
                    <div class="glass-content">
                        <h2 class="glass-title serif">Design<br>Moods</h2>
                        <p class="glass-subtitle">24 items</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-files" class="tab-content">
            <h1 class="serif" style="font-size: 36px; margin-bottom: 24px;">All Files</h1>
            <div class="gallery-grid" id="gallery">
                </div>
        </div>

        <div id="tab-profile" class="tab-content" style="text-align: center;">
            <div class="profile-avatar" id="userAvatar">B</div>
            <h1 class="serif" id="userName" style="font-size: 32px; margin-bottom: 8px;">Bekhruz</h1>
            <p class="section-title">Infinity Cloud Owner</p>
            
            <div class="glass-card" style="margin-top: 32px; height: auto; text-align: left; padding: 20px;">
                <h3 class="serif" style="font-size: 20px; margin-bottom: 16px;">Storage Health</h3>
                <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 12px;">
                    <div style="width: 15%; height: 100%; background: var(--accent-green); border-radius: 3px;"></div>
                </div>
                <p style="font-size: 14px; color: var(--text-muted);">Unlimited space available on Synology NAS</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home', this)">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </button>
            <button class="nav-item" onclick="switchTab('files', this)">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Files
            </button>
            <button class="nav-item" onclick="tg.showAlert('Upload files via Telegram Bot.')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                Upload
            </button>
            <button class="nav-item" onclick="switchTab('profile', this)">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </button>
        </nav>
    </div>

    <div class="modal" id="imageModal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImage" src="" alt="Full size">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let globalFiles = [];
        const API_URL = "https://galaxylab.i234.me:8443/api/files";
        
        // Установка имени пользователя
        const user = tg.initDataUnsafe?.user;
        const firstName = user?.first_name || 'Bekhruz';
        document.getElementById('userName').innerText = firstName;
        document.getElementById('userAvatar').innerText = firstName.charAt(0);

        async function fetchFiles() {
            const userId = user?.id || '123456789';
            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();
                if (data.status === "success" && data.files.length > 0) {
                    globalFiles = data.files;
                    updateHeroCard(globalFiles[0]);
                } else { throw new Error("No files"); }
            } catch (error) {
                // Премиум Mock-данные
                globalFiles = [
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400' },
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400' },
                    { type: 'document', text: 'Python_Bot_Code.py' },
                    { type: 'document', text: 'Economics_Summary.pdf' }
                ];
                updateHeroCard(globalFiles[3]);
            }
            renderGallery();
        }

        function updateHeroCard(file) {
            if(!file) return;
            document.getElementById('heroTitle').innerHTML = file.type === 'document' ? file.text.split('.')[0] : "Recent<br>Photo";
            document.getElementById('heroSubtitle').innerText = file.type === 'document' ? 'Document File' : 'Image File';
            
            if (file.type === 'photo') {
                document.getElementById('heroCard').style.background = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('${file.url}') center/cover`;
            }
        }

        function openHeroFile() {
            tg.HapticFeedback.impactOccurred('medium');
            if (globalFiles.length > 0 && globalFiles[0].type === 'photo') {
                openModal(globalFiles[0].url);
            } else {
                tg.showAlert("This file type is best viewed directly in the Telegram chat.");
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            globalFiles.forEach((file) => {
                const item = document.createElement('div');
                item.className = `grid-item ${file.type}`;
                
                if (file.type === 'photo') {
                    item.innerHTML = `<img src="${file.url}" alt="Photo" loading="lazy">`;
                    item.onclick = () => openModal(file.url);
                } else {
                    item.innerHTML = `<div style="font-size: 32px; margin-bottom: 8px;">📄</div><div style="font-size: 12px; font-weight: 500; word-break: break-all;">${file.text || 'File'}</div>`;
                    item.onclick = () => tg.showAlert("Documents are downloaded via bot.");
                }
                gallery.appendChild(item);
            });
        }

        function switchTab(tabId, navElement = null) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            if(navElement) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                navElement.classList.add('active');
                tg.HapticFeedback.selectionChanged();
            }
            window.scrollTo(0, 0);
        }

        function openModal(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        window.onload = fetchFiles;
    </script>
</body>
</html>
