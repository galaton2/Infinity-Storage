<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="tab-gallery" class="tab-content active">
        <div class="header">
            <h1>My Storage</h1>
            <div class="filters">
                <button class="filter-btn active" onclick="applyFilter('all')">All Files</button>
                <button class="filter-btn" onclick="applyFilter('photo')">Photos</button>
                <button class="filter-btn" onclick="applyFilter('document')">Documents</button>
            </div>
        </div>
        <div class="gallery" id="gallery">
            </div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="profile-header">
            <div class="avatar" id="userAvatar">U</div>
            <h2 id="userName">Loading...</h2>
            <p>Storage Owner</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="statTotal">0</h3>
                <p>Total Files</p>
            </div>
            <div class="stat-card">
                <h3>∞</h3>
                <p>Storage Limit</p>
            </div>
        </div>
    </div>

    <div id="tab-settings" class="tab-content">
        <div class="header">
            <h1>Settings</h1>
        </div>
        
        <div class="settings-list">
            <div class="setting-item">
                <span>Save Original Quality</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <span>Auto-sync files</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <span>Haptic Feedback</span>
                <label class="switch">
                    <input type="checkbox" id="hapticToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <button class="btn-danger" onclick="showToast('Cache cleared successfully!')">
            Clear Local Cache
        </button>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('gallery', this)">
            <div class="icon">📁</div>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile', this)">
            <div class="icon">👤</div>
            <span>Profile</span>
        </button>
        <button class="nav-item" onclick="switchTab('settings', this)">
            <div class="icon">⚙️</div>
            <span>Settings</span>
        </button>
    </nav>

    <div class="modal" id="imageModal">
        <button class="btn-close" onclick="closeModal()">✕</button>
        <img id="modalImage" src="" alt="Full size">
        <div class="modal-actions">
            <button class="modal-btn btn-download" onclick="downloadCurrentItem()">📥 Download</button>
            <button class="modal-btn btn-delete" onclick="deleteCurrentItem()">🗑 Delete</button>
        </div>
    </div>
    <div id="toast-container"></div>

    <script>
        // ================= INIT =================
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let globalFiles = [];
        let currentActiveItem = null;
        let currentFilter = 'all';

        // URL твоего Synology
        const API_URL = "https://galaxylab.i234.me:8443/api/files";

        // Подгружаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        const firstName = user?.first_name || 'Bekhruz'; // Твое имя как запасной вариант
        
        document.getElementById('userName').innerText = firstName;
        document.getElementById('userAvatar').innerText = firstName.charAt(0).toUpperCase();

        // ================= NAVIGATION LOGIC =================
        function switchTab(tabId, element) {
            // Прячем все вкладки
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Показываем нужную
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Обновляем активную иконку в меню
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            if (document.getElementById('hapticToggle').checked) {
                tg.HapticFeedback.selectionChanged();
            }
        }

        // ================= DATA FETCHING =================
        async function fetchFiles() {
            renderSkeletons();
            const userId = user?.id || '123456789';

            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();

                if (data.status === "success" && data.files.length > 0) {
                    globalFiles = data.files;
                    renderGallery();
                    document.getElementById('statTotal').innerText = globalFiles.length;
                } else {
                    globalFiles = [];
                    renderEmptyState("Archive is empty. Send files to bot.");
                }
            } catch (error) {
                // MOCK DATA для проверки дизайна без бэкенда
                globalFiles = [
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop' },
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=200&auto=format&fit=crop' },
                    { type: 'document', text: 'Economics_Report.pdf', url: '#' }
                ];
                renderGallery();
                document.getElementById('statTotal').innerText = globalFiles.length;
                showToast("Offline Demo Mode");
            }
        }

        // ================= RENDER LOGIC =================
        function renderSkeletons() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            for (let i = 0; i < 9; i++) gallery.innerHTML += `<div class="skeleton"></div>`;
        }

        function renderEmptyState(message) {
            document.getElementById('gallery').innerHTML = `<div class="empty-state"><h2 style="font-size: 40px;">📭</h2><p>${message}</p></div>`;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const filtered = globalFiles.filter(f => currentFilter === 'all' || f.type === currentFilter);
            if (filtered.length === 0) return renderEmptyState(`No ${currentFilter}s found.`);

            filtered.forEach((file) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${file.type}`;
                
                if (file.type === 'photo') {
                    itemDiv.innerHTML = `<img src="${file.url}" alt="Photo" loading="lazy">`;
                    itemDiv.onclick = () => openModal(file.url);
                } else {
                    itemDiv.innerHTML = `<span style="font-size: 30px;">📄</span><span>${file.text || 'Doc'}</span>`;
                    itemDiv.onclick = () => showToast("Documents download via Bot only");
                }
                gallery.appendChild(itemDiv);
            });
        }

        function applyFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGallery();
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.impactOccurred('light');
        }

        // ================= MODAL LOGIC =================
        function openModal(url) {
            currentActiveItem = url;
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
            currentActiveItem = null;
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ================= ACTIONS =================
        function downloadCurrentItem() {
            if (!currentActiveItem) return;
            const a = document.createElement('a');
            a.href = currentActiveItem;
            a.download = 'Infinity_Storage_File.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast("Download started!");
        }

        function deleteCurrentItem() {
            globalFiles = globalFiles.filter(f => f.url !== currentActiveItem);
            document.getElementById('statTotal').innerText = globalFiles.length;
            closeModal();
            renderGallery();
            showToast("File deleted 🗑");
            if (document.getElementById('hapticToggle').checked) tg.HapticFeedback.notificationOccurred('warning');
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 3000);
        }

        window.onload = fetchFiles;
    </script>
</body>
</html>
