<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="header">
        <h1>My Storage</h1>
        <div class="filters">
            <button class="filter-btn active" onclick="applyFilter('all')">All</button>
            <button class="filter-btn" onclick="applyFilter('photo')">Photos</button>
            <button class="filter-btn" onclick="applyFilter('document')">Documents</button>
        </div>
    </div>

    <div class="gallery" id="gallery">
        </div>

    <div class="modal" id="imageModal">
        <button class="btn-close" onclick="closeModal()">✕</button>
        <img id="modalImage" src="" alt="Full size">
        <div class="modal-actions">
            <button class="modal-btn btn-download" onclick="downloadCurrentItem()">
                📥 Download
            </button>
            <button class="modal-btn btn-delete" onclick="deleteCurrentItem()">
                🗑 Delete
            </button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // ================= STATE & INIT =================
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expand to full screen
        tg.ready();

        let globalFiles = [];
        let currentActiveItem = null; // Stores URL of currently opened item
        let currentFilter = 'all';

        // URL of your Synology API
        const API_URL = "https://galaxylab.i234.me:8443/api/files";

        // ================= CORE FUNCTIONS =================
        async function fetchFiles() {
            renderSkeletons();
            
            // Get User ID from Telegram (Fallback to mock ID if opened in normal browser)
            const userId = tg.initDataUnsafe?.user?.id || '123456789'; 

            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();

                if (data.status === "success" && data.files.length > 0) {
                    globalFiles = data.files;
                    renderGallery();
                    showToast("Synced successfully!");
                } else {
                    globalFiles = [];
                    renderEmptyState("No files found. Send something to the bot!");
                }
            } catch (error) {
                console.error("API Error:", error);
                // OFFLINE MOCK MODE: If backend is down, show mock images to test UI
                globalFiles = [
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop' },
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=200&auto=format&fit=crop' },
                    { type: 'document', text: 'Important_Report.pdf', url: '#' }
                ];
                renderGallery();
                showToast("Offline Mode (Backend disconnected)");
            }
        }

        // ================= RENDERING =================
        function renderSkeletons() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                gallery.innerHTML += `<div class="skeleton"></div>`;
            }
        }

        function renderEmptyState(message) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = `
                <div class="empty-state">
                    <h2 style="font-size: 40px; margin-bottom: 10px;">📭</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const filteredFiles = globalFiles.filter(file => 
                currentFilter === 'all' ? true : file.type === currentFilter
            );

            if (filteredFiles.length === 0) {
                renderEmptyState(`No ${currentFilter}s found.`);
                return;
            }

            filteredFiles.forEach((file) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${file.type}`;
                
                if (file.type === 'photo') {
                    itemDiv.innerHTML = `<img src="${file.url}" alt="Photo" loading="lazy">`;
                    itemDiv.onclick = () => openModal(file.url);
                } else {
                    // Document fallback UI
                    itemDiv.innerHTML = `
                        <span style="font-size: 30px;">📄</span>
                        <span>${file.text || 'Document'}</span>
                    `;
                    itemDiv.onclick = () => showToast("Documents download via Bot only currently");
                }
                
                gallery.appendChild(itemDiv);
            });
        }

        // ================= FILTERING =================
        function applyFilter(filterType) {
            currentFilter = filterType;
            
            // Update UI buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderGallery();
            tg.HapticFeedback.impactOccurred('light');
        }

        // ================= MODAL (LIGHTBOX) =================
        function openModal(imageUrl) {
            currentActiveItem = imageUrl;
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            
            img.src = imageUrl;
            modal.classList.add('active');
            
            // Telegram Haptic
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            currentActiveItem = null;
        }

        // Close modal if clicked outside image
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ================= ACTIONS =================
        function downloadCurrentItem() {
            if (!currentActiveItem) return;
            
            // Create temporary link to trigger download
            const a = document.createElement('a');
            a.href = currentActiveItem;
            a.download = 'Infinity_Storage_File.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            showToast("Download started!");
            tg.HapticFeedback.notificationOccurred('success');
        }

        function deleteCurrentItem() {
            // Right now, this deletes only from UI (Frontend). 
            // To delete from DB, we need to add a DELETE method to python API later.
            globalFiles = globalFiles.filter(file => file.url !== currentActiveItem);
            
            closeModal();
            renderGallery();
            
            showToast("File deleted 🗑");
            tg.HapticFeedback.notificationOccurred('warning');
        }

        // ================= UTILS (TOASTS) =================
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            
            container.appendChild(toast);
            
            // Remove after animation ends (3 seconds)
            setTimeout(() => {
                if (container.contains(toast)) {
                    container.removeChild(toast);
                }
            }, 3000);
        }

        // ================= START APP =================
        // Trigger fetch on load
        window.onload = fetchFiles;

    </script>
</body>
</html>
