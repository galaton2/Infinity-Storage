<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow right"></div>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-input-wrapper">
            <span>🔍</span>
            <input type="text" class="search-bar-input" id="searchBarInput" placeholder="Type filename to filter..." oninput="executeSearch()">
        </div>
        <button class="icon-btn" onclick="toggleSearchPanel()" style="font-size: 14px; font-weight:600;">Close</button>
    </div>

    <div class="container">
        <div class="header-top">
            <button class="icon-btn" onclick="toggleSearchPanel()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            </button>
            <h2 class="serif" style="font-size: 22px; letter-spacing: -0.5px;">Aura Storage</h2>
            <button class="icon-btn" onclick="switchTab('profile')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="section-title" style="margin-bottom: 16px;">Latest Upload</div>
            
            <div class="hero-card" id="heroCard">
                <div class="hero-content">
                    <h1 class="hero-title serif" id="heroTitle">No files</h1>
                    <p class="hero-subtitle" id="heroSubtitle">Send data to bot</p>
                </div>
                <button class="play-btn" onclick="triggerHeroAction()">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>

            <div class="section-title-row">
                <div class="section-title">Recent Folders</div>
                <button class="section-action-btn" onclick="createNewFolder()">+ Add Folder</button>
            </div>
            
            <div class="scroll-section" id="foldersContainer">
                </div>

            <div class="section-title" style="margin-bottom: 16px;">Folder Content</div>
            <div class="gallery-grid" id="homeFolderGallery">
                </div>
        </div>

        <div id="tab-files" class="tab-content">
            <h1 class="serif" style="font-size: 36px; margin-bottom: 24px;">All Items</h1>
            <div class="gallery-grid" id="fullGallery">
                </div>
        </div>

        <div id="tab-profile" class="tab-content" style="text-align: center;">
            <div class="profile-avatar" id="userAvatar">B</div>
            <h1 class="serif" id="userName" style="font-size: 32px; margin-bottom: 8px;">Bekhruz</h1>
            <p class="section-title">Infinity Storage Owner</p>
            
            <div class="glass-card" style="margin-top: 32px; height: auto; text-align: left; padding: 20px; width: 100%;">
                <h3 class="serif" style="font-size: 20px; margin-bottom: 16px;">Cloud Capacity</h3>
                <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 12px;">
                    <div style="width: 8%; height: 100%; background: var(--accent-green); border-radius: 3px;"></div>
                </div>
                <p style="font-size: 14px; color: var(--text-muted);">Unlimited dynamic space linked to Synology NAS Server</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home', this)">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </button>
            <button class="nav-item" onclick="switchTab('files', this)">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Files
            </button>
            <button class="nav-item" onclick="tg.showAlert('Send any image, video or text to the bot. It will securely stream to this clean web layer instantly.', () => tg.close())">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                Upload
            </button>
            <button class="nav-item" onclick="switchTab('profile', this)">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </button>
        </nav>
    </div>

    <div class="modal" id="imageModal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img id="modalImage" src="" alt="View">
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeContextSheet()"></div>
    <div class="action-sheet" id="contextSheet">
        <div class="sheet-header"><div class="sheet-drag"></div><div class="sheet-title" id="sheetFolderTitle">Manage Folder</div></div>
        <button class="sheet-btn" onclick="renameFolderAction()">✏️ Rename Folder</button>
        <button class="sheet-btn danger" onclick="deleteFolderAction()">🗑 Delete Folder</button>
    </div>

    <div id="toast-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let globalFiles = [];
        let folders = [
            { id: 'work', name: 'Work', icon: '💼' },
            { id: 'personal', name: 'Personal', icon: '🔒' }
        ];
        let activeFolderId = 'work';
        let targetedFolderId = null; // Для контекстного меню
        let searchString = '';

        const API_URL = "https://galaxylab.i234.me:8443/api/files";
        
        const user = tg.initDataUnsafe?.user;
        const firstName = user?.first_name || 'Bekhruz';
        document.getElementById('userName').innerText = firstName;
        document.getElementById('userAvatar').innerText = firstName.charAt(0);

        // Fetch Data from Synology Server
        async function fetchFiles() {
            renderSkeletons();
            const userId = user?.id || '123456789';
            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();
                if (data.status === "success" && data.files.length > 0) {
                    globalFiles = data.files;
                } else { throw new Error("empty"); }
            } catch (error) {
                // Премиальные заглушки для оффлайн/демо режима
                globalFiles = [
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400', text: 'Geometric Art', folder: 'work' },
                    { type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400', text: 'Minimal Gradient Overlay', folder: 'personal' },
                    { type: 'document', text: 'Tor_Vergata_Form.pdf', folder: 'work' },
                    { type: 'document', text: 'Vacation_Plan.docx', folder: 'personal' }
                ];
            }
            
            if(globalFiles.length > 0) {
                updateHeroHighlight(globalFiles[0]);
            }
            renderFolders();
            renderGalleries();
        }

        function renderSkeletons() {
            const grid1 = document.getElementById('homeFolderGallery');
            const grid2 = document.getElementById('fullGallery');
            grid1.innerHTML = grid2.innerHTML = '<div class="skeleton" style="aspect-ratio:1;"></div><div class="skeleton" style="aspect-ratio:1;"></div>';
        }

        function updateHeroHighlight(file) {
            if(!file) return;
            document.getElementById('heroTitle').innerHTML = file.type === 'document' ? file.text.split('.')[0] : "Visual<br>Aura Archive";
            document.getElementById('heroSubtitle').innerText = file.type === 'document' ? 'Latest Document Saved' : 'Latest Image Asset Saved';
            if (file.type === 'photo') {
                document.getElementById('heroCard').style.background = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.75)), url('${file.url}') center/cover`;
            }
        }

        function triggerHeroAction() {
            tg.HapticFeedback.impactOccurred('medium');
            if(globalFiles.length > 0 && globalFiles[0].type === 'photo') openModal(globalFiles[0].url);
        }

        // ================= INTERACTIVE FOLDERS (CRUD) =================
        function renderFolders() {
            const container = document.getElementById('foldersContainer');
            container.innerHTML = '';

            folders.forEach(folder => {
                const count = globalFiles.filter(f => f.folder === folder.id).length;
                const card = document.createElement('div');
                card.className = `glass-card ${activeFolderId === folder.id ? 'active' : ''}`;
                
                card.innerHTML = `
                    <div class="folder-icon-box">${folder.icon}</div>
                    <div>
                        <h2 class="glass-title serif">${folder.name}</h2>
                        <p class="glass-subtitle">${count} items</p>
                    </div>
                `;

                // Короткий клик — выбор папки
                card.onclick = () => {
                    activeFolderId = folder.id;
                    renderFolders();
                    renderGalleries();
                    tg.HapticFeedback.selectionChanged();
                };

                // Долгий клик/нажатие — вызов меню удаления/изменения
                let pressTimer;
                const start = () => pressTimer = setTimeout(() => openContextSheet(folder.id, folder.name), 600);
                const cancel = () => clearTimeout(pressTimer);
                
                card.addEventListener('touchstart', start);
                card.addEventListener('touchend', cancel);
                card.addEventListener('mousedown', start);
                card.addEventListener('mouseup', cancel);
                card.addEventListener('mouseleave', cancel);

                container.appendChild(card);
            });
        }

        function createNewFolder() {
            tg.HapticFeedback.impactOccurred('light');
            const name = prompt("Enter folder name:");
            if (!name) return;
            const id = 'f_' + Date.now();
            const icons = ['📁', '🌌', '🌟', '🔮', '📚', '⚡️'];
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            
            folders.push({ id: id, name: name, icon: randomIcon });
            activeFolderId = id;
            renderFolders();
            renderGalleries();
            showToast("Folder created");
        }

        function openContextSheet(id, name) {
            targetedFolderId = id;
            document.getElementById('sheetFolderTitle').innerText = `Folder: ${name}`;
            document.getElementById('contextSheet').classList.add('active');
            document.getElementById('sheetOverlay').style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeContextSheet() {
            document.getElementById('contextSheet').classList.remove('active');
            document.getElementById('sheetOverlay').style.display = 'none';
            targetedFolderId = null;
        }

        function renameFolderAction() {
            if(!targetedFolderId) return;
            const newName = prompt("Enter new folder name:");
            if(newName) {
                const folder = folders.find(f => f.id === targetedFolderId);
                if(folder) folder.name = newName;
                renderFolders();
                showToast("Folder renamed");
            }
            closeContextSheet();
        }

        function deleteFolderAction() {
            if(!targetedFolderId) return;
            // Перемещаем файлы удаляемой папки обратно в общую кучу
            globalFiles.forEach(f => { if(f.folder === targetedFolderId) f.folder = null; });
            folders = folders.filter(f => f.id !== targetedFolderId);
            
            if(activeFolderId === targetedFolderId) activeFolderId = folders[0]?.id || null;
            renderFolders();
            renderGalleries();
            showToast("Folder deleted");
            closeContextSheet();
        }

        // ================= SEARCH PANEL LOGIC (FIXED) =================
        function toggleSearchPanel() {
            const overlay = document.getElementById('searchOverlay');
            overlay.classList.toggle('active');
            if(overlay.classList.contains('active')) {
                document.getElementById('searchBarInput').focus();
            } else {
                document.getElementById('searchBarInput').value = '';
                searchString = '';
                renderGalleries();
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        function executeSearch() {
            searchString = document.getElementById('searchBarInput').value.toLowerCase();
            renderGalleries();
        }

        // ================= RENDER ARCHIVE LOGIC =================
        function renderGalleries() {
            const homeGrid = document.getElementById('homeFolderGallery');
            const fullGrid = document.getElementById('fullGallery');
            
            homeGrid.innerHTML = '';
            fullGrid.innerHTML = '';

            globalFiles.forEach((file) => {
                // Проверяем фильтр поиска
                const matchesSearch = file.text ? file.text.toLowerCase().includes(searchString) : true;
                if (!matchesSearch) return;

                const card = document.createElement('div');
                card.className = `grid-item ${file.type}`;
                
                if (file.type === 'photo') {
                    card.innerHTML = `<img src="${file.url}" alt="Image" loading="lazy">`;
                    card.onclick = () => openModal(file.url);
                } else {
                    card.innerHTML = `<div style="font-size:32px; margin-bottom:8px; z-index:2;">📄</div><div class="item-title">${file.text || 'Document'}</div>`;
                    card.onclick = () => tg.showAlert("Documents are streamed through the telegram bot channel.");
                }

                // Клон для вкладки "All Files"
                fullGrid.appendChild(card.cloneNode(true));

                // Рендерим на главную только если совпадает с активной папкой
                if (file.folder === activeFolderId) {
                    homeGrid.appendChild(card);
                }
            });

            if (homeGrid.children.length === 0) {
                homeGrid.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:20px; grid-column:1/-1; text-align:center;">This folder is currently empty</div>';
            }
        }

        function switchTab(tabId, navElement = null) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            if(navElement) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                navElement.classList.add('active');
                tg.HapticFeedback.selectionChanged();
            }
            window.scrollTo(0, 0);
        }

        function openModal(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeModal() { document.getElementById('imageModal').classList.remove('active'); }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.onload = fetchFiles;
    </script>
</body>
</html>
