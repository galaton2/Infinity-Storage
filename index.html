<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Storage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="tab-gallery" class="tab-content active">
        <div class="header">
            <h1>Storage</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleSelectionMode()" id="selectBtn">☑️</button>
                <button class="icon-btn" onclick="toggleView()" id="viewBtn">🔲</button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search files..." oninput="handleSearch()">
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="applyFilter('all')">All</button>
            <button class="filter-btn" onclick="applyFilter('photo')">Photos</button>
            <button class="filter-btn" onclick="applyFilter('document')">Documents</button>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="profile-header">
            <div class="avatar" id="userAvatar">U</div>
            <h2 id="userName">User</h2>
            <p>Admin</p>
        </div>
        
        <div class="storage-section">
            <div class="storage-header">
                <span>Storage Used</span>
                <span id="storageText">0 MB</span>
            </div>
            <div class="storage-bar-bg">
                <div class="storage-bar-fill" id="storageFill"></div>
            </div>
            <p style="font-size: 12px; color: var(--hint-color); margin-top: 12px;">Unlimited Telegram Cloud</p>
        </div>
    </div>

    <button class="fab" onclick="onFabClick()">+</button>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('gallery', this)">
            <div class="icon">📁</div><span>Home</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile', this)">
            <div class="icon">👤</div><span>Profile</span>
        </button>
    </nav>

    <div class="selection-bar" id="selectionBar">
        <button class="btn-primary" onclick="downloadSelected()">📥 Download</button>
        <button class="btn-danger-solid" onclick="deleteSelected()">🗑 Delete</button>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-header">
            <button class="modal-btn-icon" onclick="closeModal()">✕</button>
            <button class="modal-btn-icon" onclick="openActionSheet()">⋮</button>
        </div>
        <img id="modalImage" src="" alt="Full size">
    </div>

    <div class="action-sheet-overlay" id="sheetOverlay" onclick="closeActionSheet()"></div>
    <div class="action-sheet" id="actionSheet">
        <div class="sheet-drag"></div>
        <button class="sheet-btn" onclick="downloadActiveItem()">📥 Save to Device</button>
        <button class="sheet-btn danger" onclick="deleteActiveItem()">🗑 Delete File</button>
    </div>

    <div id="toast-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_URL = "https://galaxylab.i234.me:8443/api/files";
        
        // State Management
        let globalFiles = [];
        let displayFiles = []; // For search/filter state
        let currentFilter = 'all';
        let searchQuery = '';
        
        let isListView = false;
        let isSelectionMode = false;
        let selectedItems = new Set();
        
        let activeItemIndex = -1; // For Swipes

        // User Data
        const user = tg.initDataUnsafe?.user;
        const firstName = user?.first_name || 'Bekhruz';
        document.getElementById('userName').innerText = firstName;
        document.getElementById('userAvatar').innerText = firstName.charAt(0).toUpperCase();

        // ================= FETCH & RENDER =================
        async function fetchFiles() {
            renderSkeletons();
            const userId = user?.id || '123456789';

            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();
                globalFiles = (data.status === "success") ? data.files : [];
            } catch (error) {
                // Mock Data for testing Offline
                globalFiles = [
                    { id: 1, type: 'photo', url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400', text: 'Wallpaper 1', date: 'Today' },
                    { id: 2, type: 'photo', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=400', text: 'Wallpaper 2', date: 'Yesterday' },
                    { id: 3, type: 'document', text: 'Economics_Report.pdf', url: '#', date: '10 Jun' }
                ];
                showToast("Offline Demo Mode");
            }
            
            updateStorageStats();
            applyFiltersAndSearch();
        }

        function applyFiltersAndSearch() {
            displayFiles = globalFiles.filter(f => {
                const matchType = currentFilter === 'all' || f.type === currentFilter;
                const matchSearch = (f.text || '').toLowerCase().includes(searchQuery);
                return matchType && matchSearch;
            });
            renderGallery();
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (displayFiles.length === 0) {
                gallery.innerHTML = `<div class="empty-state"><h2 style="font-size: 40px;">📭</h2><p>No files found</p></div>`;
                return;
            }

            displayFiles.forEach((file, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${file.type}`;
                if (selectedItems.has(file.url)) itemDiv.classList.add('selected');
                
                // Content based on type
                let contentHTML = '';
                if (file.type === 'photo') {
                    contentHTML = `<img src="${file.url}" loading="lazy">`;
                } else {
                    contentHTML = `<div class="doc-icon">📄</div>`;
                }

                // Layout structure
                itemDiv.innerHTML = `
                    <div class="checkbox"></div>
                    ${contentHTML}
                    <div class="item-info">
                        <div class="title">${file.text || (file.type === 'photo' ? 'Photo' : 'Document')}</div>
                        <div class="subtitle">${file.date || 'Saved locally'}</div>
                    </div>
                `;

                // Logic on click
                itemDiv.onclick = () => handleItemClick(file.url, index, itemDiv);
                gallery.appendChild(itemDiv);
            });
        }

        // ================= INTERACTION LOGIC =================
        function handleItemClick(url, index, element) {
            if (isSelectionMode) {
                tg.HapticFeedback.selectionChanged();
                if (selectedItems.has(url)) {
                    selectedItems.delete(url);
                    element.classList.remove('selected');
                } else {
                    selectedItems.add(url);
                    element.classList.add('selected');
                }
                updateSelectionBar();
            } else {
                if (displayFiles[index].type === 'photo') {
                    openModal(index);
                } else {
                    showToast("Docs download via Bot only");
                }
            }
        }

        // Search & Filters
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            applyFiltersAndSearch();
        }

        function applyFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            applyFiltersAndSearch();
        }

        // View & Selection Toggles
        function toggleView() {
            isListView = !isListView;
            const gallery = document.getElementById('gallery');
            const btn = document.getElementById('viewBtn');
            if (isListView) {
                gallery.classList.add('list-view');
                btn.innerText = '🔳';
            } else {
                gallery.classList.remove('list-view');
                btn.innerText = '🔲';
            }
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleSelectionMode() {
            isSelectionMode = !isSelectionMode;
            document.getElementById('gallery').classList.toggle('selection-mode');
            document.getElementById('selectBtn').style.background = isSelectionMode ? 'var(--button-color)' : 'var(--secondary-bg)';
            
            if (!isSelectionMode) {
                selectedItems.clear();
                renderGallery(); // Reset visual states
            }
            updateSelectionBar();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateSelectionBar() {
            const bar = document.getElementById('selectionBar');
            if (isSelectionMode && selectedItems.size > 0) {
                bar.classList.add('visible');
            } else {
                bar.classList.remove('visible');
            }
        }

        // ================= MODAL & SWIPES =================
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        let touchStartX = 0;

        function openModal(index) {
            activeItemIndex = index;
            modalImg.src = displayFiles[index].url;
            modal.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Swipe Logic
        modal.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        modal.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            handleSwipe(touchStartX - touchEndX);
        });

        function handleSwipe(diff) {
            if (Math.abs(diff) < 50) return; // Ignore small moves
            if (diff > 0 && activeItemIndex < displayFiles.length - 1) {
                // Swipe Left -> Next Image
                findNextPhoto(1);
            } else if (diff < 0 && activeItemIndex > 0) {
                // Swipe Right -> Prev Image
                findNextPhoto(-1);
            }
        }

        function findNextPhoto(direction) {
            let nextIndex = activeItemIndex + direction;
            while (nextIndex >= 0 && nextIndex < displayFiles.length) {
                if (displayFiles[nextIndex].type === 'photo') {
                    openModal(nextIndex);
                    return;
                }
                nextIndex += direction;
            }
        }

        // ================= ACTION SHEET (iOS Menu) =================
        function openActionSheet() {
            document.getElementById('sheetOverlay').classList.add('active');
            document.getElementById('actionSheet').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeActionSheet() {
            document.getElementById('sheetOverlay').classList.remove('active');
            document.getElementById('actionSheet').classList.remove('active');
        }

        function downloadActiveItem() {
            closeActionSheet();
            const a = document.createElement('a');
            a.href = displayFiles[activeItemIndex].url;
            a.download = 'Photo.jpg';
            a.click();
            showToast("Download started!");
        }

        function deleteActiveItem() {
            closeActionSheet();
            closeModal();
            globalFiles = globalFiles.filter(f => f.url !== displayFiles[activeItemIndex].url);
            applyFiltersAndSearch();
            updateStorageStats();
            showToast("File deleted");
            tg.HapticFeedback.notificationOccurred('warning');
        }

        // ================= UTILS & FAB =================
        function onFabClick() {
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showAlert("Отправьте любой файл или фото прямо в чат боту, и он автоматически появится здесь!", () => {
                tg.close();
            });
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function updateStorageStats() {
            // Rough estimation: 1 file = ~2MB.
            let estimatedMB = globalFiles.length * 2.4;
            document.getElementById('storageText').innerText = `${estimatedMB.toFixed(1)} MB`;
            
            // Visual fill (max 1000MB for progress bar visual)
            let percent = Math.min((estimatedMB / 1000) * 100, 100);
            document.getElementById('storageFill').style.width = `${percent > 0 ? percent : 2}%`;
        }

        function showToast(msg) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast'; t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => { if (c.contains(t)) c.removeChild(t); }, 3000);
        }

        function renderSkeletons() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            for (let i = 0; i < 12; i++) gallery.innerHTML += `<div class="skeleton" style="aspect-ratio: 1/1;"></div>`;
        }

        // Infinite Scroll Mock Listener (Ready for backend update)
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                // Here we will call fetchFiles(offset) when Python API supports it
            }
        });

        window.onload = fetchFiles;
    </script>
</body>
</html>
